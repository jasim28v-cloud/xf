<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TikToki | منصة فيديوهات قصيرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        /* شاشة تسجيل الدخول */
        .login-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: radial-gradient(circle at 30% 10%, #0f0f1a, #050505);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 32px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(236, 72, 153, 0.3);
            box-shadow: 0 0 40px rgba(236, 72, 153, 0.2);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-card h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        .login-card input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 15px;
        }
        .login-card input:focus {
            outline: none;
            border-color: #ec489a;
            background: rgba(236, 72, 153, 0.1);
        }
        .login-card button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .login-card button:active { transform: scale(0.98); }
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.03);
            border-radius: 60px;
            padding: 4px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.3s;
        }
        .auth-tab.active {
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            color: white;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
        }
        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .version { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 24px; }

        /* التطبيق الرئيسي */
        #mainApp { display: none; height: 100vh; background: #000; position: relative; overflow-y: auto; }

        /* شريط علوي */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
        }
        .logo-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .top-icons {
            display: flex;
            gap: 20px;
        }
        .top-icon {
            background: none;
            border: none;
            font-size: 24px;
            color: white;
            cursor: pointer;
        }
        .global-mute {
            position: fixed;
            top: 80px;
            right: 16px;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* حاوية الفيديوهات */
        .videos-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .videos-container::-webkit-scrollbar { display: none; }
        .video-item {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }
        .video-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* معلومات الفيديو */
        .video-info {
            position: absolute;
            bottom: 100px;
            left: 16px;
            right: 80px;
            z-index: 20;
        }
        .author-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .author-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            border: 2px solid white;
            overflow: hidden;
        }
        .author-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .author-name {
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .follow-btn {
            background: #ec489a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            color: white;
        }
        .video-caption {
            font-size: 14px;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .video-music {
            font-size: 12px;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .hashtag { color: #ec489a; cursor: pointer; }
        .mention { color: #06b6d4; cursor: pointer; }

        /* الأزرار الجانبية */
        .side-actions {
            position: absolute;
            right: 12px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 20;
        }
        .side-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 11px;
        }
        .side-btn i { font-size: 32px; }
        .side-btn.active i { color: #ec489a; }
        .side-btn .count { font-weight: bold; }

        /* شريط سفلي */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0 24px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 10px;
        }
        .nav-item i { font-size: 24px; }
        .nav-item.active { color: #ec489a; transform: translateY(-2px); }
        .create-btn {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -28px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.5);
        }

        /* لوحة الرفع */
        .upload-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 300;
            transform: translateX(100%);
            transition: 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow-y: auto;
        }
        .upload-panel.open { transform: translateX(0); }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            background: #000;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: white;
            cursor: pointer;
        }
        .upload-content { max-width: 500px; margin: 0 auto; padding: 20px; }
        .video-preview-area {
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 24px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px dashed rgba(236, 72, 153, 0.3);
        }
        .video-preview-area:hover { border-color: #ec489a; background: rgba(236,72,153,0.05); }
        .preview-placeholder { text-align: center; padding: 60px 20px; }
        .preview-placeholder i { font-size: 64px; color: #ec489a; margin-bottom: 16px; }
        .video-preview { width: 100%; max-height: 300px; object-fit: contain; background: #000; display: none; }
        .upload-form { background: #111; border-radius: 20px; padding: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: rgba(255,255,255,0.8); }
        .form-group label i { color: #ec489a; margin-right: 8px; }
        .form-group textarea, .form-group input { width: 100%; padding: 14px 16px; background: #1a1a2a; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: white; }
        .upload-progress { margin: 20px 0; display: none; }
        .progress-bar { background: rgba(255,255,255,0.1); border-radius: 30px; height: 8px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #ec489a, #ff6b6b); width: 0%; height: 100%; transition: width 0.3s; }
        .upload-actions { display: flex; gap: 15px; margin-top: 20px; }
        .cancel-upload-btn, .upload-submit-btn { padding: 14px; border-radius: 30px; font-weight: bold; cursor: pointer; border: none; }
        .cancel-upload-btn { flex: 1; background: rgba(255,255,255,0.1); color: white; }
        .upload-submit-btn { flex: 2; background: linear-gradient(135deg, #ec489a, #ff6b6b); color: white; }

        /* صفحة الملف الشخصي */
        .profile-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 300;
            transform: translateX(100%);
            transition: 0.3s;
            overflow-y: auto;
        }
        .profile-panel.open { transform: translateX(0); }
        .profile-cover {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            object-fit: cover;
        }
        .profile-header {
            text-align: center;
            padding: 0 20px 20px;
            position: relative;
        }
        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: -50px auto 10px;
            border: 3px solid white;
            overflow: hidden;
            cursor: pointer;
        }
        .profile-avatar-large img { width: 100%; height: 100%; object-fit: cover; }
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
        }
        .stat { text-align: center; }
        .stat-number { font-size: 22px; font-weight: bold; }
        .stat-label { font-size: 12px; opacity: 0.7; }
        .xp-bar {
            width: 100%;
            max-width: 200px;
            margin: 10px auto;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            height: 6px;
        }
        .xp-fill {
            background: #ec489a;
            width: 0%;
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s;
        }
        .edit-profile-btn, .logout-btn, .follow-btn, .message-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            margin: 0 8px;
            cursor: pointer;
        }
        .follow-btn { background: #ec489a; border: none; }
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            margin-top: 16px;
        }
        .video-thumb {
            aspect-ratio: 9/16;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }
        .video-thumb .views {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 12px;
        }

        /* صفحة الدردشة */
        .chat-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 350;
            transform: translateX(100%);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }
        .chat-panel.open { transform: translateX(0); }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-message {
            display: flex;
            gap: 8px;
            max-width: 85%;
        }
        .chat-message.sent { align-self: flex-end; flex-direction: row-reverse; }
        .message-bubble {
            background: #1a1a2a;
            padding: 8px 12px;
            border-radius: 18px;
        }
        .message-bubble.sent { background: #ec489a; }
        .message-image { max-width: 200px; border-radius: 12px; cursor: pointer; }
        .chat-input-area {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: #111;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .chat-input-area input {
            flex: 1;
            background: #1a1a2a;
            border: none;
            border-radius: 30px;
            padding: 10px 16px;
            color: white;
        }
        .conversations-list {
            padding: 16px;
            overflow-y: auto;
        }
        .conversation-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }

        /* صفحة الأصوات */
        .sounds-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 350;
            transform: translateX(100%);
            transition: 0.3s;
        }
        .sounds-panel.open { transform: translateX(0); }
        .sound-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }

        /* صفحة الإشعارات */
        .notifications-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 350;
            transform: translateX(100%);
            transition: 0.3s;
        }
        .notifications-panel.open { transform: translateX(0); }
        .notification-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* صفحة البحث */
        .search-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 350;
            transform: translateX(100%);
            transition: 0.3s;
        }
        .search-panel.open { transform: translateX(0); }
        .search-input {
            width: calc(100% - 32px);
            margin: 16px;
            padding: 12px 16px;
            background: #1a1a2a;
            border: none;
            border-radius: 30px;
            color: white;
        }
        .search-result {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }

        .watermark {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 25;
            pointer-events: none;
        }
        .heart-animation {
            position: fixed;
            font-size: 80px;
            color: #ec489a;
            pointer-events: none;
            z-index: 1000;
            animation: heartFloat 0.8s ease-out forwards;
        }
        @keyframes heartFloat {
            0% { transform: scale(0.5) translateY(0); opacity: 1; }
            100% { transform: scale(1.5) translateY(-100px); opacity: 0; }
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: rgba(255,255,255,0.5);
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(236,72,153,0.3);
            border-top-color: #ec489a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
        }
    </style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h1>TikToki ❤️</h1>
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuth('login')">تسجيل الدخول</button>
            <button class="auth-tab" onclick="switchAuth('register')">إنشاء حساب</button>
        </div>
        <div id="loginForm" class="auth-form active">
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
            <div id="loginMsg" class="text-red-500 text-sm text-center mt-3"></div>
        </div>
        <div id="registerForm" class="auth-form">
            <input type="text" id="regName" placeholder="اسم المستخدم">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPass" placeholder="كلمة المرور (6 أحرف)">
            <button onclick="register()">إنشاء حساب</button>
            <div id="regMsg" class="text-red-500 text-sm text-center mt-3"></div>
        </div>
        <div class="version">الإصدار 4.0 | مارس 2026</div>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="mainApp">
    <div class="top-bar">
        <div class="logo-text">TikToki ❤️</div>
        <div class="top-icons">
            <i class="fas fa-search top-icon" onclick="openSearch()"></i>
            <i class="fas fa-music top-icon" onclick="openSounds()"></i>
            <i class="fas fa-bell top-icon" onclick="openNotifications()"></i>
        </div>
    </div>
    <div class="global-mute" onclick="toggleGlobalMute()"><i class="fas fa-volume-up" id="globalMuteIcon"></i></div>

    <div class="videos-container" id="videosContainer">
        <div class="loading"><div class="spinner"></div><span>جاري التحميل...</span></div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home')"><i class="fas fa-home"></i><span>الرئيسية</span></button>
        <button class="nav-item" onclick="openUploadPanel()"><i class="fas fa-plus-circle"></i><span>رفع</span></button>
        <button class="nav-item" onclick="openMessages()"><i class="fas fa-comment"></i><span>الرسائل</span></button>
        <button class="nav-item" onclick="openMyProfile()"><i class="fas fa-user"></i><span>الملف</span></button>
    </div>

    <!-- لوحة الرفع -->
    <div id="uploadPanel" class="upload-panel">
        <div class="panel-header"><h3><i class="fas fa-upload ml-2"></i> رفع فيديو جديد</h3><button class="close-btn" onclick="closeUploadPanel()"><i class="fas fa-times"></i></button></div>
        <div class="upload-content">
            <div class="video-preview-area" onclick="document.getElementById('videoFileInput').click()">
                <div class="preview-placeholder"><i class="fas fa-cloud-upload-alt"></i><p>اضغط لاختيار فيديو</p><span class="preview-hint">MP4, MOV, WebM - حتى 100MB</span></div>
                <video id="videoPreview" class="video-preview" controls></video>
            </div>
            <input type="file" id="videoFileInput" accept="video/*" style="display:none" onchange="selectVideoFile(this)">
            <div class="upload-form">
                <div class="form-group"><label><i class="fas fa-pen"></i> وصف الفيديو</label><textarea id="videoDescription" rows="3" placeholder="اكتب وصفاً... استخدم # للهاشتاقات أو @ للإشارة" oninput="showSuggestions()"></textarea><div id="suggestions" class="flex flex-wrap gap-2 mt-2"></div></div>
                <div class="form-group"><label><i class="fas fa-music"></i> اسم الصوت</label><input type="text" id="videoMusic" placeholder="مثال: Original Sound - أو اسم أغنية"></div>
                <div class="upload-progress" id="uploadProgressBar"><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div><div class="text-center text-sm mt-2 text-[#ec489a]" id="progressText">0%</div></div>
                <div class="upload-actions"><button class="cancel-upload-btn" onclick="closeUploadPanel()">إلغاء</button><button class="upload-submit-btn" id="uploadSubmitBtn" onclick="uploadVideo()">رفع الفيديو</button></div>
                <div id="uploadStatus" class="text-center mt-4 text-sm"></div>
            </div>
        </div>
    </div>

    <!-- صفحة الملف الشخصي -->
    <div id="profilePanel" class="profile-panel">
        <div class="back-btn" onclick="closeProfile()"><i class="fas fa-arrow-right"></i></div>
        <div id="profileCover" class="profile-cover" style="background: linear-gradient(135deg, #ec489a, #06b6d4);"></div>
        <div class="profile-header">
            <div class="profile-avatar-large" id="profileAvatarDisplay" onclick="changeAvatar()">👤</div>
            <h2 id="profileNameDisplay" class="mt-2"></h2>
            <p id="profileBioDisplay" class="text-sm opacity-70"></p>
            <div id="xpBar" class="xp-bar"><div id="xpFill" class="xp-fill"></div></div>
            <div class="profile-stats">
                <div class="stat"><div class="stat-number" id="profileFollowing">0</div><div class="stat-label">يتابع</div></div>
                <div class="stat"><div class="stat-number" id="profileFollowers">0</div><div class="stat-label">متابع</div></div>
                <div class="stat"><div class="stat-number" id="profileLikes">0</div><div class="stat-label">إجمالي الإعجابات</div></div>
                <div class="stat"><div class="stat-number" id="profileLevel">1</div><div class="stat-label">المستوى</div></div>
            </div>
            <div id="profileActions"></div>
        </div>
        <div class="p-4"><h4 class="mb-3 font-bold">فيديوهاتي</h4><div id="profileVideosList" class="videos-grid"></div></div>
    </div>

    <!-- لوحة تعديل الملف الشخصي -->
    <div id="editProfilePanel" class="profile-panel" style="transform:translateX(100%)">
        <div class="back-btn" onclick="closeEditProfile()"><i class="fas fa-arrow-right"></i></div>
        <div class="profile-header"><div class="profile-avatar-large" id="editAvatarDisplay" onclick="changeAvatar()">👤</div><p class="text-xs text-gray-400 mt-2">اضغط لتغيير الصورة</p></div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
        <div class="p-4">
            <input type="text" id="editUsername" class="w-full p-3 rounded-xl bg-[#1a1a2a] border-none text-white mb-3" placeholder="اسم المستخدم">
            <textarea id="editBio" class="w-full p-3 rounded-xl bg-[#1a1a2a] border-none text-white" rows="3" placeholder="السيرة الذاتية"></textarea>
            <div class="mb-3">
                <label class="text-sm text-gray-400">صورة الغلاف</label>
                <div class="w-full h-32 bg-[#1a1a2a] rounded-xl mt-1 cursor-pointer overflow-hidden" onclick="document.getElementById('coverInput').click()">
                    <img id="coverPreview" class="w-full h-full object-cover">
                </div>
                <input type="file" id="coverInput" accept="image/*" style="display:none" onchange="uploadCover(this)">
            </div>
            <button onclick="saveProfile()" class="w-full mt-4 bg-gradient-to-r from-[#ec489a] to-[#06b6d4] text-white p-3 rounded-xl font-bold">حفظ</button>
        </div>
    </div>

    <!-- صفحة الدردشة -->
    <div id="chatPanel" class="chat-panel">
        <div class="panel-header"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-gradient-to-r from-pink-500 to-cyan-500 flex items-center justify-center" id="chatAvatar">👤</div><h3 id="chatUserName">محادثة</h3></div><button class="close-btn" onclick="closeChat()"><i class="fas fa-times"></i></button></div>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-area">
            <div class="cursor-pointer text-2xl" onclick="document.getElementById('chatImageInput').click()"><i class="fas fa-image"></i></div>
            <input type="file" id="chatImageInput" accept="image/*" style="display:none" onchange="sendChatImage(this)">
            <input type="text" id="chatMessageInput" placeholder="اكتب رسالة...">
            <button onclick="sendChatMessage()" class="bg-gradient-to-r from-pink-500 to-cyan-500 text-white px-4 rounded-full"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- قائمة المحادثات -->
    <div id="conversationsPanel" class="chat-panel">
        <div class="panel-header"><h3>المحادثات</h3><button class="close-btn" onclick="closeConversations()"><i class="fas fa-times"></i></button></div>
        <div id="conversationsList" class="conversations-list"></div>
    </div>

    <!-- صفحة الأصوات -->
    <div id="soundsPanel" class="sounds-panel">
        <div class="panel-header"><h3>الأصوات الشائعة</h3><button class="close-btn" onclick="closeSounds()"><i class="fas fa-times"></i></button></div>
        <div id="soundsList"></div>
    </div>

    <!-- صفحة الإشعارات -->
    <div id="notificationsPanel" class="notifications-panel">
        <div class="panel-header"><h3>الإشعارات</h3><button class="close-btn" onclick="closeNotifications()"><i class="fas fa-times"></i></button></div>
        <div id="notificationsList"></div>
    </div>

    <!-- صفحة البحث -->
    <div id="searchPanel" class="search-panel">
        <div class="panel-header"><h3>بحث</h3><button class="close-btn" onclick="closeSearch()"><i class="fas fa-times"></i></button></div>
        <input type="text" id="searchInput" class="search-input" placeholder="بحث عن مستخدمين، هاشتاقات، فيديوهات..." onkeyup="searchAll()">
        <div id="searchResults"></div>
    </div>
</div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
